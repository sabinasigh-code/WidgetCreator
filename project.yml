name: WidgetCreator
options:
  bundleIdPrefix: com.widgetcreator
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    SWIFT_VERSION: "5.0"

targets:
  WidgetCreator:
    type: application
    platform: iOS
    sources:
      - path: WidgetCreator/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.widgetcreator.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: WidgetCreator/entitlements.plist
    dependencies:
      - target: WidgetCreatorWidget
        embed: true

  WidgetCreatorWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WidgetCreatorWidget/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.widgetcreator.app.widget
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: WidgetCreatorWidget/entitlements.plist
